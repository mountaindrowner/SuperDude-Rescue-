<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Super Dude">
<title>Super Dude Danny</title>
<!-- PWA: installable web app. Once added to the home screen the game
     opens full-screen with no browser chrome, and a service worker
     caches the shell so it runs offline after the first visit. -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">
<!-- Hint the browser to prefetch the first-played tracks at top
     priority so they're buffered the moment the user presses a
     key on the title card (Mark Pass 9: 'music started really
     late'). Without this, the browser deprioritized title.mp3
     behind all the PNG sprite assets and the user-gesture play()
     had to wait for the buffer. -->
<link rel="preload" as="audio" href="assets/music/title.mp3" type="audio/mpeg">
<link rel="preload" as="audio" href="assets/music/intro.mp3" type="audio/mpeg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="game-container">
  <canvas id="game" width="960" height="540"></canvas>

  <!-- On-screen touch controls (shown only on touch devices) -->
  <div id="touch-controls" aria-hidden="true">
    <div id="dpad">
      <button class="tc-btn tc-up"    data-action="up">&#9650;</button>
      <button class="tc-btn tc-left"  data-action="left">&#9664;</button>
      <button class="tc-btn tc-right" data-action="right">&#9654;</button>
      <button class="tc-btn tc-down"  data-action="down">&#9660;</button>
    </div>
    <div id="action-pad">
      <button class="tc-btn tc-b" data-action="blast">B</button>
      <button class="tc-btn tc-a" data-action="jump">A</button>
    </div>
    <button class="tc-btn tc-pause" data-action="pause" aria-label="Pause / Start">&#9776;</button>
  </div>
</div>

<!-- Game scripts: plain classic scripts, loaded in dependency order so the
     game runs straight from the file system with no build step or server. -->
<script src="js/save.js"></script>
<script src="js/input.js"></script>
<script src="js/audio.js"></script>
<script src="js/sprites.js"></script>
<script src="js/engine.js"></script>
<script src="js/entities.js"></script>
<script src="js/level1.js"></script>
<script src="js/level_2_1.js"></script>
<script src="js/level_2_2.js"></script>
<script src="js/level_3_1.js"></script>
<script src="js/level_3_2.js"></script>
<script src="js/level_4_1.js"></script>
<script src="js/level_4_2.js"></script>
<script src="js/level_5_1.js"></script>
<script src="js/level_5_2.js"></script>
<script src="js/level_6_1.js"></script>
<script src="js/level_6_2.js"></script>
<script src="js/level_7_1.js"></script>
<script src="js/quiz_data.js"></script>
<script src="js/scenes.js"></script>
<script src="js/editor.js"></script>
<script src="js/main.js"></script>

<!-- Service worker registration. Runs only on http/https origins -
     file:// loads (running index.html locally with no server) skip
     it silently. -->
<script>
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    window.addEventListener('load', function () {
      // updateViaCache:'none' makes the browser bypass its HTTP cache when
      // fetching service-worker.js, so every page load sees a fresh SW
      // file. .update() additionally triggers an immediate update check.
      // Together these guarantee a new deploy reaches users on the very
      // next reload instead of waiting up to 24h for the SW cache to
      // expire.
      navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' })
        .then(function (reg) { try { reg.update(); } catch (e) {} })
        .catch(function (err) {
          console.warn('Service worker registration failed:', err);
        });
    });
  }
</script>
</body>
</html>
